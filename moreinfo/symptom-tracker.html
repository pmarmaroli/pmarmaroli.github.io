<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Tracker - Health Monitoring Platform</title>
    <meta name="description" content="Symptom Tracker web app for logging and monitoring health symptoms over time with visual charts and export features.">
    <link rel="canonical" href="https://pmarmaroli.github.io/moreinfo/symptom-tracker.html">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #2563eb;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            color: #1e40af;
            border-bottom: 2px solid #93c5fd;
            padding-bottom: 10px;
            margin-top: 30px;
        }
        h3 {
            color: #1e3a8a;
            margin-top: 25px;
        }
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .tech-item {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .feature-card {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #2563eb;
        }
        .feature-card h4 {
            color: #1e40af;
            margin-top: 0;
        }
        .feature-card h3 {
            color: #1e40af;
            margin-top: 0;
        }
        .demo-section {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #93c5fd;
            margin: 25px 0;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 30px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        .back-link:hover {
            transform: translateY(-2px);
            color: white;
        }
        .highlight {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #2563eb;
            margin: 15px 0;
        }
        .architecture-diagram {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            margin: 20px 0;
            font-family: monospace;
            overflow-x: auto;
        }
        /* ── App-specific styles ── */
        .app-wrapper {
            max-width: 860px;
            margin: 0 auto;
        }
        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 16px;
        }
        .form-row label {
            display: flex;
            flex-direction: column;
            font-size: 0.85em;
            font-weight: 600;
            color: #1e40af;
            gap: 4px;
            flex: 1 1 140px;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            padding: 8px 10px;
            border: 1.5px solid #93c5fd;
            border-radius: 8px;
            font-size: 0.95em;
            background: #f0f9ff;
            color: #1e3a8a;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-row input:focus,
        .form-row select:focus,
        .form-row textarea:focus {
            border-color: #2563eb;
        }
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.92em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn:hover { transform: translateY(-1px); opacity: 0.92; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }
        .btn-danger  { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-success { background: linear-gradient(135deg, #16a34a, #15803d); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 0.82em; }

        /* Chart toggle */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 0 10px 0;
        }
        .toggle-group span {
            font-size: 0.85em;
            font-weight: 600;
            color: #1e40af;
        }
        .toggle-btn {
            padding: 6px 16px;
            border: 1.5px solid #93c5fd;
            border-radius: 20px;
            background: #f0f9ff;
            color: #2563eb;
            font-size: 0.83em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-color: #1d4ed8;
        }

        /* Log table */
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            margin-top: 12px;
        }
        .log-table th {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
        }
        .log-table td {
            padding: 7px 12px;
            border-bottom: 1px solid #e0f2fe;
        }
        .log-table tr:hover td { background: #f0f9ff; }

        .severity-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 12px;
            font-size: 0.82em;
            font-weight: 700;
        }
        .sev-1 { background:#d1fae5; color:#065f46; }
        .sev-2 { background:#fef9c3; color:#854d0e; }
        .sev-3 { background:#fee2e2; color:#991b1b; }

        .empty-msg {
            text-align: center;
            color: #6b7280;
            font-style: italic;
            padding: 20px;
        }

        ul li { margin: 8px 0; }
        .emoji { font-size: 1.2em; margin-right: 8px; }
    </style>
</head>

<body>
    <nav style="padding:0.75rem 1.5rem;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-family:Inter,sans-serif;font-size:0.88rem;">
        <a href="/" style="color:#3b82f6;text-decoration:none;">&larr; Back to pmarmaroli.github.io</a>
    </nav>

    <div class="container app-wrapper">
        <h1>📊 Symptom Tracker</h1>

        <!-- ── LOG ENTRY ── -->
        <h2>➕ Log a Symptom</h2>
        <div class="form-row">
            <label>Symptom
                <select id="symptomSelect">
                    <option value="">— select —</option>
                    <option>Headache</option>
                    <option>Fatigue</option>
                    <option>Nausea</option>
                    <option>Dizziness</option>
                    <option>Chest pain</option>
                    <option>Shortness of breath</option>
                    <option>Joint pain</option>
                    <option>Fever</option>
                    <option>Cough</option>
                    <option>Other</option>
                </select>
            </label>
            <label id="otherLabel" style="display:none;">Custom symptom
                <input type="text" id="customSymptom" placeholder="Describe symptom">
            </label>
            <label>Severity
                <select id="severitySelect">
                    <option value="1">1 – Mild</option>
                    <option value="2" selected>2 – Moderate</option>
                    <option value="3">3 – Severe</option>
                </select>
            </label>
            <label>Date &amp; time
                <input type="datetime-local" id="datetimeInput">
            </label>
            <label style="flex:2 1 200px;">Notes
                <input type="text" id="notesInput" placeholder="Optional notes…">
            </label>
            <button class="btn btn-primary" onclick="addEntry()">Log</button>
        </div>
        <div id="addMsg" style="font-size:0.87em;color:#16a34a;min-height:18px;"></div>

        <!-- ── CHART ── -->
        <h2>📈 Occurrences Over Time</h2>
        <div class="form-row" style="align-items:center;margin-bottom:8px;">
            <label style="flex:0 1 auto;">Symptom filter
                <select id="chartSymptomFilter" onchange="renderChart()">
                    <option value="all">All symptoms</option>
                </select>
            </label>
            <div class="toggle-group" style="margin-left:auto;margin-bottom:0;">
                <span>Group by:</span>
                <button class="toggle-btn active" id="btnDay"  onclick="setGranularity('day')">Per day</button>
                <button class="toggle-btn"        id="btnHour" onclick="setGranularity('hour')">Per hour</button>
            </div>
        </div>
        <canvas id="symptomChart" height="90"></canvas>

        <!-- ── LOG TABLE ── -->
        <h2>📋 Symptom Log</h2>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-bottom:10px;">
            <button class="btn btn-success btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
            <button class="btn btn-danger  btn-sm" onclick="clearAll()">🗑 Clear all</button>
        </div>
        <table class="log-table">
            <thead>
                <tr>
                    <th>Date / Time</th>
                    <th>Symptom</th>
                    <th>Severity</th>
                    <th>Notes</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
        <div id="emptyMsg" class="empty-msg">No symptoms logged yet. Add your first entry above.</div>

        <a href="../index.html" class="back-link" style="display:inline-block;margin-top:30px;">← Back to Portfolio</a>
    </div>

    <script>
    // ── Storage helpers ──────────────────────────────────────────────
    const STORAGE_KEY = 'symptomTrackerLogs_v1';

    function loadEntries() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }

    function saveEntries(entries) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    // ── State ────────────────────────────────────────────────────────
    let granularity = 'day'; // 'day' | 'hour'
    let chartInstance = null;

    // ── Init ─────────────────────────────────────────────────────────
    (function init() {
        // Default datetime to now
        const now = new Date();
        now.setSeconds(0, 0);
        document.getElementById('datetimeInput').value = now.toISOString().slice(0, 16);

        document.getElementById('symptomSelect').addEventListener('change', function () {
            document.getElementById('otherLabel').style.display =
                this.value === 'Other' ? '' : 'none';
        });

        refreshAll();
    })();

    // ── Add entry ────────────────────────────────────────────────────
    function addEntry() {
        const selectEl  = document.getElementById('symptomSelect');
        const customEl  = document.getElementById('customSymptom');
        const sevEl     = document.getElementById('severitySelect');
        const dtEl      = document.getElementById('datetimeInput');
        const notesEl   = document.getElementById('notesInput');
        const msgEl     = document.getElementById('addMsg');

        let symptom = selectEl.value === 'Other'
            ? customEl.value.trim()
            : selectEl.value;

        if (!symptom) { msgEl.style.color='#ef4444'; msgEl.textContent='Please select or enter a symptom.'; return; }
        if (!dtEl.value) { msgEl.style.color='#ef4444'; msgEl.textContent='Please select a date and time.'; return; }

        // Sanitise free-text inputs
        const sanitise = s => s.replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c]));
        symptom = sanitise(symptom.slice(0, 80));
        const notes = sanitise(notesEl.value.trim().slice(0, 200));

        const entries = loadEntries();
        entries.push({
            id: Date.now(),
            symptom,
            severity: parseInt(sevEl.value, 10),
            datetime: dtEl.value,    // ISO-ish: "YYYY-MM-DDTHH:mm"
            notes
        });
        saveEntries(entries);

        // Reset inputs
        selectEl.value = '';
        customEl.value = '';
        notesEl.value  = '';
        document.getElementById('otherLabel').style.display = 'none';
        const next = new Date();
        next.setSeconds(0, 0);
        dtEl.value = next.toISOString().slice(0, 16);

        msgEl.style.color = '#16a34a';
        msgEl.textContent = '✓ Symptom logged!';
        setTimeout(() => msgEl.textContent = '', 2500);

        refreshAll();
    }

    // ── Delete entry ─────────────────────────────────────────────────
    function deleteEntry(id) {
        const entries = loadEntries().filter(e => e.id !== id);
        saveEntries(entries);
        refreshAll();
    }

    // ── Clear all ────────────────────────────────────────────────────
    function clearAll() {
        if (!confirm('Delete all symptom records? This cannot be undone.')) return;
        saveEntries([]);
        refreshAll();
    }

    // ── Granularity toggle ───────────────────────────────────────────
    function setGranularity(g) {
        granularity = g;
        document.getElementById('btnDay').classList.toggle('active',  g === 'day');
        document.getElementById('btnHour').classList.toggle('active', g === 'hour');
        renderChart();
    }

    // ── Refresh all UI ───────────────────────────────────────────────
    function refreshAll() {
        populateFilterDropdown();
        renderChart();
        renderTable();
    }

    // ── Populate symptom filter dropdown ─────────────────────────────
    function populateFilterDropdown() {
        const entries  = loadEntries();
        const filterEl = document.getElementById('chartSymptomFilter');
        const current  = filterEl.value;
        const symptoms = [...new Set(entries.map(e => e.symptom))].sort();

        filterEl.innerHTML = '<option value="all">All symptoms</option>';
        symptoms.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            filterEl.appendChild(opt);
        });
        if (symptoms.includes(current)) filterEl.value = current;
    }

    // ── Render chart ─────────────────────────────────────────────────
    function renderChart() {
        const entries    = loadEntries();
        const filterSym  = document.getElementById('chartSymptomFilter').value;
        const filtered   = filterSym === 'all' ? entries : entries.filter(e => e.symptom === filterSym);

        // Build bucket key per entry
        const buckets = {};
        filtered.forEach(e => {
            const key = granularity === 'hour'
                ? e.datetime.slice(0, 13).replace('T', ' ') + ':00'  // "YYYY-MM-DD HH:00"
                : e.datetime.slice(0, 10);                            // "YYYY-MM-DD"
            buckets[key] = (buckets[key] || 0) + 1;
        });

        const labels = Object.keys(buckets).sort();
        const data   = labels.map(k => buckets[k]);

        const ctx = document.getElementById('symptomChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        if (labels.length === 0) {
            chartInstance = null;
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#6b7280';
            ctx.textAlign = 'center';
            ctx.fillText('No data to display.', ctx.canvas.width / 2, 60);
            return;
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Occurrences',
                    data,
                    backgroundColor: 'rgba(37, 99, 235, 0.55)',
                    borderColor: '#2563eb',
                    borderWidth: 1.5,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            title: ctx => granularity === 'hour'
                                ? ctx[0].label + ' (hour slot)'
                                : ctx[0].label
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { font: { size: 11 }, maxRotation: 45 },
                        title: {
                            display: true,
                            text: granularity === 'hour' ? 'Hour' : 'Date',
                            color: '#1e40af', font: { weight: 'bold' }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1, precision: 0 },
                        title: {
                            display: true,
                            text: 'Occurrences',
                            color: '#1e40af', font: { weight: 'bold' }
                        }
                    }
                }
            }
        });
    }

    // ── Render table ─────────────────────────────────────────────────
    function renderTable() {
        const entries = loadEntries().slice().sort((a, b) => b.datetime.localeCompare(a.datetime));
        const tbody   = document.getElementById('logBody');
        const empty   = document.getElementById('emptyMsg');

        tbody.innerHTML = '';
        if (entries.length === 0) { empty.style.display = ''; return; }
        empty.style.display = 'none';

        const sevLabel = ['', 'Mild', 'Moderate', 'Severe'];
        const sevClass = ['', 'sev-1', 'sev-2', 'sev-3'];

        entries.forEach(e => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escHtml(e.datetime.replace('T', ' '))}</td>
                <td>${escHtml(e.symptom)}</td>
                <td><span class="severity-badge ${sevClass[e.severity]}">${sevLabel[e.severity]}</span></td>
                <td>${escHtml(e.notes)}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})">✕</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ── CSV export ───────────────────────────────────────────────────
    function exportCSV() {
        const entries = loadEntries().slice().sort((a, b) => a.datetime.localeCompare(b.datetime));
        if (!entries.length) { alert('No data to export.'); return; }

        const header = ['Date/Time', 'Symptom', 'Severity', 'Notes'];
        const rows = entries.map(e => [
            e.datetime,
            csvEsc(e.symptom),
            e.severity,
            csvEsc(e.notes)
        ]);
        const csv = [header, ...rows].map(r => r.join(',')).join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'symptom-log.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ── Utils ────────────────────────────────────────────────────────
    function escHtml(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function csvEsc(s) {
        s = (s || '').replace(/"/g, '""');
        return /[,"\n]/.test(s) ? `"${s}"` : s;
    }
    </script>
</body>

</html>
